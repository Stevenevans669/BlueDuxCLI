openapi: 3.1.0
info:
  title: Bluedux API
  version: 0.1.0
  description: |
    Bluedux is a Markdown-aware private file cloud with snapshots, sharing,
    and agent-native APIs. This specification covers the JSON API surface
    used by both the CLI and programmatic agents.

    All endpoints (except authentication and public share access) require
    a valid Bearer token obtained via the login flow.

servers:
  - url: https://api.bluedux.io/v0
    description: Production
  - url: http://localhost:3000/v0
    description: Local development

tags:
  - name: auth
    description: Authentication and session management
  - name: library
    description: Personal Library file operations
  - name: snapshots
    description: Snapshot (version) management
  - name: shares
    description: Sharing and invite management
  - name: public
    description: Public share access

paths:
  # ── Auth ────────────────────────────────────────────────────────────

  /auth/login:
    post:
      operationId: startLogin
      tags: [auth]
      summary: Start browser-based login flow
      description: |
        Initiates a browser-based OAuth session. Returns a URL the client
        must open and a session token to poll for completion.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                force:
                  type: boolean
                  default: false
                  description: Re-authenticate even if already logged in.
      responses:
        "200":
          description: Login flow initiated
          content:
            application/json:
              schema:
                type: object
                required: [status, login_url, session_token, expires_in]
                properties:
                  status:
                    type: string
                    const: ok
                  login_url:
                    type: string
                    format: uri
                    description: URL the user must open in a browser.
                  session_token:
                    type: string
                    description: Opaque token used to poll login status.
                  expires_in:
                    type: integer
                    description: Seconds until the login session expires (120).
        "500":
          $ref: "#/components/responses/ServerError"

  /auth/login/poll:
    post:
      operationId: pollLogin
      tags: [auth]
      summary: Poll for login completion
      description: |
        Polls the login session started by `startLogin`. Returns credentials
        once the user completes authentication in the browser.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [session_token]
              properties:
                session_token:
                  type: string
                  description: Session token from `startLogin`.
      responses:
        "200":
          description: Login complete
          content:
            application/json:
              schema:
                type: object
                required: [status, user, access_token, refresh_token]
                properties:
                  status:
                    type: string
                    const: ok
                  user:
                    type: string
                    format: email
                    description: Authenticated user email.
                  access_token:
                    type: string
                    description: Bearer token for API access.
                  refresh_token:
                    type: string
                    description: Token used to refresh the access token.
        "202":
          description: Login still pending
          content:
            application/json:
              schema:
                type: object
                required: [status]
                properties:
                  status:
                    type: string
                    const: pending
        "408":
          description: Login timed out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                status: error
                code: 1
                message: "Login timed out. Try again."
        "500":
          $ref: "#/components/responses/ServerError"

  /auth/refresh:
    post:
      operationId: refreshAccessToken
      tags: [auth]
      summary: Refresh an access token
      description: |
        Exchanges a valid refresh token for a new access token and
        refresh token pair. Does not require Bearer authentication.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refresh_token]
              properties:
                refresh_token:
                  type: string
                  description: Refresh token from `pollLogin` or a prior refresh.
      responses:
        "200":
          description: Tokens refreshed
          content:
            application/json:
              schema:
                type: object
                required: [status, access_token, refresh_token]
                properties:
                  status:
                    type: string
                    const: ok
                  access_token:
                    type: string
                    description: New Bearer token for API access.
                  refresh_token:
                    type: string
                    description: New refresh token (previous one is invalidated).
        "401":
          $ref: "#/components/responses/AuthError"
        "422":
          $ref: "#/components/responses/ValidationError"
        "500":
          $ref: "#/components/responses/ServerError"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: End the current session
      description: Revokes the current access and refresh tokens.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                type: object
                required: [status]
                properties:
                  status:
                    type: string
                    const: ok

  /auth/whoami:
    get:
      operationId: whoami
      tags: [auth]
      summary: Get current user
      description: Returns the email of the currently authenticated user.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                type: object
                required: [status, user]
                properties:
                  status:
                    type: string
                    const: ok
                  user:
                    type: string
                    format: email
        "401":
          $ref: "#/components/responses/AuthError"

  # ── Library ─────────────────────────────────────────────────────────

  /library/files:
    get:
      operationId: listFiles
      tags: [library]
      summary: List files in Personal Library
      description: Returns all files the authenticated user owns.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: File list
          content:
            application/json:
              schema:
                type: object
                required: [status, files]
                properties:
                  status:
                    type: string
                    const: ok
                  files:
                    type: array
                    items:
                      $ref: "#/components/schemas/FileEntry"
        "401":
          $ref: "#/components/responses/AuthError"

  /library/files/{path}:
    get:
      operationId: getFileDetail
      tags: [library]
      summary: Get file detail
      description: Returns metadata and access URLs for a single file in the Personal Library.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/FilePath"
      responses:
        "200":
          description: File detail
          content:
            application/json:
              schema:
                type: object
                required: [status, file]
                properties:
                  status:
                    type: string
                    const: ok
                  file:
                    $ref: "#/components/schemas/FileDetail"
        "401":
          $ref: "#/components/responses/AuthError"
        "404":
          $ref: "#/components/responses/NotFound"

  /library/files/resolve-dependencies:
    post:
      operationId: resolveDependencies
      tags: [library]
      summary: Resolve Markdown dependencies
      description: |
        Parses a Markdown file and returns the list of relative image
        references it contains, indicating which are present and which
        are missing.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [path]
              properties:
                path:
                  type: string
                  description: Path of the Markdown file to inspect.
                  example: /notes.md
      responses:
        "200":
          description: Resolved dependencies
          content:
            application/json:
              schema:
                type: object
                required: [status, path, dependencies]
                properties:
                  status:
                    type: string
                    const: ok
                  path:
                    type: string
                  dependencies:
                    type: array
                    items:
                      type: object
                      required: [path, exists]
                      properties:
                        path:
                          type: string
                          description: Relative path referenced in the Markdown.
                        exists:
                          type: boolean
                          description: Whether this dependency exists in the library.
        "401":
          $ref: "#/components/responses/AuthError"
        "404":
          $ref: "#/components/responses/NotFound"

  /library/blobs:
    post:
      operationId: uploadBlobs
      tags: [library]
      summary: Upload content-addressed blobs
      description: |
        Uploads one or more content-addressed blobs. The server deduplicates
        by hash. Only blobs the server does not already have need to be sent.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [blobs]
              properties:
                blobs:
                  type: array
                  items:
                    type: string
                    format: binary
                  description: One or more file blobs to upload.
      responses:
        "200":
          description: Blobs accepted
          content:
            application/json:
              schema:
                type: object
                required: [status, received]
                properties:
                  status:
                    type: string
                    const: ok
                  received:
                    type: array
                    items:
                      type: object
                      required: [hash, size]
                      properties:
                        hash:
                          type: string
                          description: Content hash of the blob.
                        size:
                          type: integer
                          description: Size in bytes.
        "401":
          $ref: "#/components/responses/AuthError"

  /library/blobs/check:
    post:
      operationId: checkBlobs
      tags: [library]
      summary: Check which blobs the server already has
      description: |
        Given a list of content hashes, returns which ones the server
        already stores. The client should only upload missing blobs.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [hashes]
              properties:
                hashes:
                  type: array
                  items:
                    type: string
                  description: List of content hashes to check.
      responses:
        "200":
          description: Blob presence check
          content:
            application/json:
              schema:
                type: object
                required: [status, missing]
                properties:
                  status:
                    type: string
                    const: ok
                  missing:
                    type: array
                    items:
                      type: string
                    description: Hashes the server does not have.
        "401":
          $ref: "#/components/responses/AuthError"

  /library/upload:
    post:
      operationId: uploadFile
      tags: [library]
      summary: Upload a file and create a snapshot
      description: |
        High-level upload endpoint. Accepts a single file, creates the
        content-addressed blob, and commits a new Snapshot for the path.
        For Markdown files, parses relative image references and returns
        warnings for any missing dependencies.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                  description: The file to upload.
                path:
                  type: string
                  description: |
                    Target path in the Personal Library. If omitted, derived
                    from the uploaded filename.
                  example: /docs/notes.md
      responses:
        "200":
          description: File uploaded, snapshot created
          content:
            application/json:
              schema:
                type: object
                required: [status, file, path, snapshot]
                properties:
                  status:
                    type: string
                    const: ok
                  file:
                    type: string
                    description: Uploaded filename.
                  path:
                    type: string
                    description: Path in Personal Library.
                  snapshot:
                    type: string
                    description: Snapshot identifier.
                  warnings:
                    type: array
                    items:
                      $ref: "#/components/schemas/Warning"
              example:
                status: ok
                file: notes.md
                path: /notes.md
                snapshot: abc123def
                warnings:
                  - type: missing_dependency
                    path: images/diagram.png
        "401":
          $ref: "#/components/responses/AuthError"
        "422":
          $ref: "#/components/responses/ValidationError"

  # ── Snapshots ───────────────────────────────────────────────────────

  /library/snapshots:
    post:
      operationId: createSnapshot
      tags: [snapshots]
      summary: Create a snapshot from uploaded blobs
      description: |
        Commits a new immutable Snapshot for a path, referencing
        previously uploaded blobs by hash.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [path, hash]
              properties:
                path:
                  type: string
                  description: Path in Personal Library.
                  example: /notes.md
                hash:
                  type: string
                  description: Content hash of the blob for this snapshot.
      responses:
        "201":
          description: Snapshot created
          content:
            application/json:
              schema:
                type: object
                required: [status, path, snapshot]
                properties:
                  status:
                    type: string
                    const: ok
                  path:
                    type: string
                  snapshot:
                    type: string
                    description: New snapshot identifier.
        "401":
          $ref: "#/components/responses/AuthError"
        "404":
          $ref: "#/components/responses/NotFound"

  /library/files/{path}/versions:
    get:
      operationId: listVersions
      tags: [snapshots]
      summary: List version history for a file
      description: Returns all snapshots for the given path, newest first.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/FilePath"
      responses:
        "200":
          description: Version list
          content:
            application/json:
              schema:
                type: object
                required: [status, path, versions]
                properties:
                  status:
                    type: string
                    const: ok
                  path:
                    type: string
                  versions:
                    type: array
                    items:
                      $ref: "#/components/schemas/Snapshot"
        "401":
          $ref: "#/components/responses/AuthError"
        "404":
          $ref: "#/components/responses/NotFound"

  /library/files/{path}/restore:
    post:
      operationId: restoreVersion
      tags: [snapshots]
      summary: Restore a prior version
      description: |
        Creates a new Snapshot whose content matches the specified prior
        snapshot. History is never mutated; restore always appends.
        Because Shares point to the live Path, recipients see the
        restored state automatically.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/FilePath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [snapshot]
              properties:
                snapshot:
                  type: string
                  description: Identifier of the snapshot to restore.
      responses:
        "200":
          description: Version restored
          content:
            application/json:
              schema:
                type: object
                required: [status, path, snapshot]
                properties:
                  status:
                    type: string
                    const: ok
                  path:
                    type: string
                  snapshot:
                    type: string
                    description: Identifier of the newly created snapshot.
        "401":
          $ref: "#/components/responses/AuthError"
        "404":
          $ref: "#/components/responses/NotFound"

  # ── Shares ──────────────────────────────────────────────────────────

  /shares:
    get:
      operationId: listShares
      tags: [shares]
      summary: List shares on a path
      description: Returns all active Shares for the given path owned by the authenticated user.
      security:
        - bearerAuth: []
      parameters:
        - name: path
          in: query
          required: true
          schema:
            type: string
          description: Path in Personal Library to list shares for.
          example: /notes.md
      responses:
        "200":
          description: Share list
          content:
            application/json:
              schema:
                type: object
                required: [status, path, shares]
                properties:
                  status:
                    type: string
                    const: ok
                  path:
                    type: string
                  shares:
                    type: array
                    items:
                      $ref: "#/components/schemas/Share"
        "401":
          $ref: "#/components/responses/AuthError"
        "404":
          $ref: "#/components/responses/NotFound"

    post:
      operationId: createShare
      tags: [shares]
      summary: Create a share or invite
      description: |
        Creates a viewer-only Share for an existing file. If the target
        user does not have an account, an Invite is created and sent
        to the provided email.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [path, to]
              properties:
                path:
                  type: string
                  description: Path in Personal Library.
                  example: /notes.md
                to:
                  type: string
                  description: Target username or email.
                  example: steve@example.com
                password:
                  type: string
                  description: Optional password to protect the share.
      responses:
        "201":
          description: Share or invite created
          content:
            application/json:
              schema:
                type: object
                required: [status, path, to, type, link, password_set]
                properties:
                  status:
                    type: string
                    const: ok
                  path:
                    type: string
                  to:
                    type: string
                  type:
                    type: string
                    enum: [share, invite]
                    description: |
                      `share` if the target user exists, `invite` if an
                      invitation email was sent.
                  link:
                    type: string
                    format: uri
                    description: Canonical share link.
                    example: https://app.bluedux.io/s/a8f3k2x9
                  password_set:
                    type: boolean
              examples:
                direct_share:
                  summary: Share to existing user
                  value:
                    status: ok
                    path: /notes.md
                    to: steve@example.com
                    type: share
                    link: https://app.bluedux.io/s/a8f3k2x9
                    password_set: true
                invite:
                  summary: Invite to new user
                  value:
                    status: ok
                    path: /notes.md
                    to: newuser@example.com
                    type: invite
                    link: https://app.bluedux.io/s/a8f3k2x9
                    password_set: false
        "401":
          $ref: "#/components/responses/AuthError"
        "404":
          description: Path not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                status: error
                code: 3
                message: "Path not found: /notes.md. Upload it first."
        "422":
          $ref: "#/components/responses/ValidationError"

  /shares/{share_id}:
    get:
      operationId: getShare
      tags: [shares]
      summary: Get share details including link and password
      description: |
        Returns full details of a Share, including the canonical link
        and the password (owner-only). This is the only endpoint that
        returns the share password.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ShareId"
      responses:
        "200":
          description: Share details
          content:
            application/json:
              schema:
                type: object
                required: [status, share]
                properties:
                  status:
                    type: string
                    const: ok
                  share:
                    $ref: "#/components/schemas/ShareDetail"
        "401":
          $ref: "#/components/responses/AuthError"
        "404":
          $ref: "#/components/responses/NotFound"

    patch:
      operationId: updateShare
      tags: [shares]
      summary: Update share password
      description: Change or remove the password on a Share. Owner-only.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ShareId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                password:
                  type:
                    - string
                    - "null"
                  description: |
                    New password value. Set to `null` to remove
                    password protection.
      responses:
        "200":
          description: Share updated
          content:
            application/json:
              schema:
                type: object
                required: [status, password_set]
                properties:
                  status:
                    type: string
                    const: ok
                  password_set:
                    type: boolean
        "401":
          $ref: "#/components/responses/AuthError"
        "404":
          $ref: "#/components/responses/NotFound"

    delete:
      operationId: revokeShare
      tags: [shares]
      summary: Revoke a share
      description: |
        Revokes a Share, invalidating its canonical link. Owner-only.
        This action cannot be undone.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ShareId"
      responses:
        "200":
          description: Share revoked
          content:
            application/json:
              schema:
                type: object
                required: [status]
                properties:
                  status:
                    type: string
                    const: ok
        "401":
          $ref: "#/components/responses/AuthError"
        "404":
          $ref: "#/components/responses/NotFound"

  /shared-with-me:
    get:
      operationId: listSharedWithMe
      tags: [shares]
      summary: List files shared with the current user
      description: Returns all files other users have shared with the authenticated user.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Shared files
          content:
            application/json:
              schema:
                type: object
                required: [status, files]
                properties:
                  status:
                    type: string
                    const: ok
                  files:
                    type: array
                    items:
                      $ref: "#/components/schemas/SharedFile"
        "401":
          $ref: "#/components/responses/AuthError"

  # ── Public Share Access ─────────────────────────────────────────────

  /s/{share_token}:
    get:
      operationId: getSharedContent
      tags: [public]
      summary: Access shared content via share link
      description: |
        Opens shared content by token. If the Share is password-protected,
        returns a `password_required` status. The client must then POST
        with the password.
      parameters:
        - $ref: "#/components/parameters/ShareToken"
      responses:
        "200":
          description: Shared content
          content:
            application/json:
              schema:
                type: object
                required: [status, file]
                properties:
                  status:
                    type: string
                    const: ok
                  file:
                    $ref: "#/components/schemas/SharedFileContent"
        "403":
          description: Password required
          content:
            application/json:
              schema:
                type: object
                required: [status]
                properties:
                  status:
                    type: string
                    const: password_required
        "404":
          description: Share not found or revoked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

    post:
      operationId: unlockSharedContent
      tags: [public]
      summary: Unlock password-protected shared content
      description: Submits the password for a password-protected Share.
      parameters:
        - $ref: "#/components/parameters/ShareToken"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [password]
              properties:
                password:
                  type: string
      responses:
        "200":
          description: Content unlocked
          content:
            application/json:
              schema:
                type: object
                required: [status, file]
                properties:
                  status:
                    type: string
                    const: ok
                  file:
                    $ref: "#/components/schemas/SharedFileContent"
        "401":
          description: Wrong password
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                status: error
                code: 2
                message: "Incorrect password."
        "404":
          description: Share not found or revoked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

# ────────────────────────────────────────────────────────────────────────

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: Access token obtained via the login flow.

  parameters:
    FilePath:
      name: path
      in: path
      required: true
      schema:
        type: string
      description: URL-encoded file path in Personal Library.
      example: "%2Fnotes.md"

    ShareId:
      name: share_id
      in: path
      required: true
      schema:
        type: string
      description: Unique share identifier.

    ShareToken:
      name: share_token
      in: path
      required: true
      schema:
        type: string
      description: Opaque, non-guessable share token from the canonical link.

  schemas:
    Error:
      type: object
      required: [status, code, message]
      properties:
        status:
          type: string
          const: error
        code:
          type: integer
          description: |
            Exit-code-aligned error category.
            1 = general error, 2 = auth error, 3 = validation error.
          enum: [1, 2, 3]
        message:
          type: string

    Warning:
      type: object
      required: [type, path]
      properties:
        type:
          type: string
          enum: [missing_dependency]
        path:
          type: string
          description: Relative path of the missing dependency.

    FileEntry:
      type: object
      required: [path, size, created_at, updated_at, latest_snapshot]
      properties:
        path:
          type: string
          example: /notes.md
        size:
          type: integer
          description: Size in bytes of the latest snapshot.
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        latest_snapshot:
          type: string
          description: Identifier of the most recent snapshot.

    FileDetail:
      type: object
      required: [path, size, content_type, created_at, updated_at, latest_snapshot, content_url]
      properties:
        path:
          type: string
          example: /notes.md
        size:
          type: integer
          description: Size in bytes of the latest snapshot.
        content_type:
          type: string
          description: MIME type of the file.
          example: text/markdown
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        latest_snapshot:
          type: string
          description: Identifier of the most recent snapshot.
        content_url:
          type: string
          format: uri
          description: Authenticated URL to read or download the file content.
        preview_supported:
          type: boolean
          description: Whether a rendered preview is available.
        preview_url:
          type: string
          format: uri
          description: URL for the rendered preview, if supported.

    Snapshot:
      type: object
      required: [snapshot, hash, size, created_at]
      properties:
        snapshot:
          type: string
          description: Snapshot identifier.
        hash:
          type: string
          description: Content hash of the blob.
        size:
          type: integer
          description: Size in bytes.
        created_at:
          type: string
          format: date-time

    Share:
      type: object
      required: [share_id, to, type, link, password_set, created_at]
      properties:
        share_id:
          type: string
        to:
          type: string
          description: Recipient username or email.
        type:
          type: string
          enum: [share, invite]
        link:
          type: string
          format: uri
          example: https://app.bluedux.io/s/a8f3k2x9
        password_set:
          type: boolean
        created_at:
          type: string
          format: date-time

    ShareDetail:
      type: object
      required: [share_id, path, to, type, link, password_set, created_at]
      properties:
        share_id:
          type: string
        path:
          type: string
        to:
          type: string
        type:
          type: string
          enum: [share, invite]
        link:
          type: string
          format: uri
        password:
          type: string
          description: |
            Share password in plaintext. Only returned to the owner.
            Null when no password is set.
        password_set:
          type: boolean
        created_at:
          type: string
          format: date-time

    SharedFile:
      type: object
      required: [path, owner, updated_at]
      properties:
        path:
          type: string
        owner:
          type: string
          description: Owner username or email.
        updated_at:
          type: string
          format: date-time

    SharedFileContent:
      type: object
      required: [path, owner, content_type, snapshot, updated_at]
      properties:
        path:
          type: string
        owner:
          type: string
        content_type:
          type: string
          description: MIME type of the file.
          example: text/markdown
        snapshot:
          type: string
          description: Current snapshot identifier.
        content_url:
          type: string
          format: uri
          description: URL to download the file content.
        updated_at:
          type: string
          format: date-time

  responses:
    AuthError:
      description: Authentication required or session expired
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          examples:
            not_logged_in:
              value:
                status: error
                code: 2
                message: "Not logged in. Run bluedux login."
            expired:
              value:
                status: error
                code: 2
                message: "Session expired. Run bluedux login."

    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            status: error
            code: 3
            message: "Not found."

    ValidationError:
      description: Validation error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            status: error
            code: 3
            message: "Validation failed."

    ServerError:
      description: Server error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            status: error
            code: 1
            message: "Internal server error."

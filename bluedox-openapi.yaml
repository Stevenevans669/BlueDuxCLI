openapi: 3.0.3
info:
  title: Bluedox API
  description: |
    Bluedox is a Markdown-aware private file cloud with snapshots, sharing, and agent-native APIs.
    This API serves both the Human Surface (CLI / Web App) and the Agent Surface (Skill / automation scripts).
  version: 1.0.0
  contact:
    name: Bluedox Team

servers:
  - url: https://api.bluedox.io/v1
    description: Production
  - url: http://localhost:3001/v1
    description: Local development

# ─────────────────────────────────────────────
# Security Schemes
# ─────────────────────────────────────────────
security:
  - BearerAuth: []

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      description: |
        Access Token issued by PocketBase Auth (TTL 1 hour), or
        Agent API Key generated in the Web App with configurable scopes.
    ShareAccessToken:
      type: http
      scheme: bearer
      description: |
        Temporary Share Access Token issued by POST /share-access/{share_token}/verify.
        Used to access password-protected shared content. Prefixed with `sat_temp_`, TTL 1 hour.

  # ─────────────────────────────────────────────
  # Reusable Parameters
  # ─────────────────────────────────────────────
  parameters:
    CursorParam:
      name: cursor
      in: query
      description: Opaque pagination cursor
      schema:
        type: string
    LimitParam:
      name: limit
      in: query
      description: Page size
      schema:
        type: integer
        default: 100
        minimum: 1
        maximum: 1000
    PathQueryParam:
      name: path
      in: query
      required: true
      description: File path in the Personal Library
      schema:
        type: string
        example: /notes.md
    ShareIdParam:
      name: share_id
      in: path
      required: true
      description: Share ID
      schema:
        type: string
        example: shr_001
    ShareTokenParam:
      name: share_token
      in: path
      required: true
      description: Opaque, non-guessable share token
      schema:
        type: string
        example: xK9mP2qR

  # ─────────────────────────────────────────────
  # Reusable Schemas
  # ─────────────────────────────────────────────
  schemas:
    # ── Envelope ──
    SuccessEnvelope:
      type: object
      required: [ok, data]
      properties:
        ok:
          type: boolean
          enum: [true]
        data:
          type: object

    ErrorEnvelope:
      type: object
      required: [ok, error]
      properties:
        ok:
          type: boolean
          enum: [false]
        error:
          $ref: "#/components/schemas/ErrorDetail"

    ErrorDetail:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
          enum:
            - VALIDATION_ERROR
            - UNAUTHORIZED
            - FORBIDDEN
            - RESOURCE_NOT_FOUND
            - CONFLICT
            - PAYLOAD_TOO_LARGE
            - RATE_LIMITED
            - INTERNAL_ERROR
            - INVALID_PASSWORD
        message:
          type: string

    # ── Domain Objects ──
    UserSummary:
      type: object
      required: [id, username]
      properties:
        id:
          type: string
          example: usr_001
        username:
          type: string
          example: steven

    UserFull:
      allOf:
        - $ref: "#/components/schemas/UserSummary"
        - type: object
          required: [email]
          properties:
            email:
              type: string
              format: email
              example: steven@example.com

    PathEntry:
      type: object
      required: [path, content_type, size_bytes, current_snapshot_id, created_at, updated_at]
      properties:
        path:
          type: string
          example: /notes.md
        content_type:
          type: string
          example: text/markdown
        size_bytes:
          type: integer
          example: 2048
        current_snapshot_id:
          type: string
          example: snap_abc123
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    PathDetail:
      allOf:
        - $ref: "#/components/schemas/PathEntry"
        - type: object
          required: [blob_hash, snapshot_count]
          properties:
            blob_hash:
              type: string
              example: "sha256:abc123..."
            snapshot_count:
              type: integer
              example: 3

    SnapshotEntry:
      type: object
      required: [snapshot_id, version_number, blob_hash, size_bytes, created_at, is_current]
      properties:
        snapshot_id:
          type: string
          example: snap_abc123
        version_number:
          type: integer
          example: 3
        blob_hash:
          type: string
          example: "sha256:abc123..."
        size_bytes:
          type: integer
          example: 2048
        created_at:
          type: string
          format: date-time
        is_current:
          type: boolean

    Dependency:
      type: object
      required: [relative_path, blob_hash]
      properties:
        relative_path:
          type: string
          example: ./images/diagram.png
        blob_hash:
          type: string
          example: "sha256:dep789..."

    SnapshotWarning:
      type: object
      required: [type, target]
      properties:
        type:
          type: string
          enum: [missing_dependency]
        target:
          type: string
          example: ./assets/logo.svg

    ShareRecipientUser:
      type: object
      required: [id, username]
      properties:
        id:
          type: string
          example: usr_002
        username:
          type: string
          example: alice

    ShareRecipientEmail:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email
          example: bob@example.com

    ShareEntry:
      type: object
      required: [share_id, share_token, share_link, recipient, has_password, type, created_at]
      properties:
        share_id:
          type: string
          example: shr_001
        share_token:
          type: string
          example: xK9mP2qR
        share_link:
          type: string
          format: uri
          example: https://app.bluedox.io/s/xK9mP2qR
        path:
          type: string
          example: /notes.md
        recipient:
          oneOf:
            - $ref: "#/components/schemas/ShareRecipientUser"
            - $ref: "#/components/schemas/ShareRecipientEmail"
        has_password:
          type: boolean
        password:
          type: string
          description: |
            Only returned when the owner requests GET /shares/{share_id}.
            Stored encrypted at rest on the server, not one-way hashed.
        type:
          type: string
          enum: [share, invite]
        created_at:
          type: string
          format: date-time

    SharedWithMeItem:
      type: object
      required: [share_id, share_token, share_link, path_name, owner, has_password, updated_at]
      properties:
        share_id:
          type: string
        share_token:
          type: string
        share_link:
          type: string
          format: uri
        path_name:
          type: string
          example: report.md
        owner:
          $ref: "#/components/schemas/UserSummary"
        has_password:
          type: boolean
        updated_at:
          type: string
          format: date-time

    AuditEvent:
      type: object
      required: [event_id, action, actor, timestamp]
      properties:
        event_id:
          type: string
          example: evt_001
        action:
          type: string
          enum:
            - auth.login
            - library.upload
            - share.create
            - invite.create
            - share.password_view
            - share.password_change
            - share.revoke
            - snapshot.restore
        actor:
          $ref: "#/components/schemas/UserSummary"
        target_path:
          type: string
          example: /notes.md
        metadata:
          type: object
          additionalProperties: true
        timestamp:
          type: string
          format: date-time

  # ─────────────────────────────────────────────
  # Reusable Responses
  # ─────────────────────────────────────────────
  responses:
    BadRequest:
      description: Invalid request parameters
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
          example:
            ok: false
            error:
              code: VALIDATION_ERROR
              message: "Field 'path' is required"
    Unauthorized:
      description: Missing or expired token
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
          example:
            ok: false
            error:
              code: UNAUTHORIZED
              message: "Missing or expired token"
    Forbidden:
      description: Insufficient permissions
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
          example:
            ok: false
            error:
              code: FORBIDDEN
              message: "Insufficient permissions"
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
          example:
            ok: false
            error:
              code: RESOURCE_NOT_FOUND
              message: "Resource not found"
    Conflict:
      description: Duplicate resource conflict
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
          example:
            ok: false
            error:
              code: CONFLICT
              message: "Share already exists for this path and recipient"
    RateLimited:
      description: Rate limit exceeded
      headers:
        Retry-After:
          schema:
            type: integer
          description: Seconds to wait before retrying
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
          example:
            ok: false
            error:
              code: RATE_LIMITED
              message: "Rate limit exceeded"

# ═════════════════════════════════════════════
# Paths
# ═════════════════════════════════════════════
paths:

  # ── Auth ──────────────────────────────────

  /auth/cli-session:
    post:
      operationId: createCliSession
      tags: [Auth]
      summary: Create a CLI login session
      description: |
        First step of the browser-based CLI authentication flow.
        Returns an auth URL and session ID for the CLI to open in the browser.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [callback_port]
              properties:
                callback_port:
                  type: integer
                  description: Local callback server port on the CLI side (49152–65535)
                  minimum: 49152
                  maximum: 65535
                  example: 52431
      responses:
        "200":
          description: Session created
          content:
            application/json:
              schema:
                type: object
                required: [ok, data]
                properties:
                  ok:
                    type: boolean
                    enum: [true]
                  data:
                    type: object
                    required: [session_id, auth_url, expires_in]
                    properties:
                      session_id:
                        type: string
                        example: sess_abc123
                      auth_url:
                        type: string
                        format: uri
                        example: https://app.bluedox.io/auth/cli?session=sess_abc123
                      expires_in:
                        type: integer
                        description: Session TTL in seconds
                        example: 300
        "400":
          $ref: "#/components/responses/BadRequest"
        "429":
          $ref: "#/components/responses/RateLimited"

  /auth/cli-callback:
    post:
      operationId: cliCallback
      tags: [Auth]
      summary: Exchange auth code for tokens
      description: Called after the user completes authentication in the browser.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [session_id, auth_code]
              properties:
                session_id:
                  type: string
                  example: sess_abc123
                auth_code:
                  type: string
      responses:
        "200":
          description: Token exchange successful
          content:
            application/json:
              schema:
                type: object
                required: [ok, data]
                properties:
                  ok:
                    type: boolean
                    enum: [true]
                  data:
                    type: object
                    required: [access_token, refresh_token, expires_at, user]
                    properties:
                      access_token:
                        type: string
                      refresh_token:
                        type: string
                      expires_at:
                        type: string
                        format: date-time
                      user:
                        $ref: "#/components/schemas/UserFull"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          description: Session not found or expired
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /auth/refresh:
    post:
      operationId: refreshToken
      tags: [Auth]
      summary: Refresh an access token
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refresh_token]
              properties:
                refresh_token:
                  type: string
      responses:
        "200":
          description: Token refreshed
          content:
            application/json:
              schema:
                type: object
                required: [ok, data]
                properties:
                  ok:
                    type: boolean
                    enum: [true]
                  data:
                    type: object
                    required: [access_token, expires_at]
                    properties:
                      access_token:
                        type: string
                      expires_at:
                        type: string
                        format: date-time
        "401":
          $ref: "#/components/responses/Unauthorized"

  /auth/me:
    get:
      operationId: getMe
      tags: [Auth]
      summary: Get current authenticated user
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                required: [ok, data]
                properties:
                  ok:
                    type: boolean
                    enum: [true]
                  data:
                    $ref: "#/components/schemas/UserFull"
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ── Users ─────────────────────────────────

  /users/resolve:
    get:
      operationId: resolveUser
      tags: [Users]
      summary: Resolve a user by username or email
      description: Used before creating a Share to confirm the recipient's identity.
      parameters:
        - name: q
          in: query
          required: true
          description: Username or email address
          schema:
            type: string
            example: alice
      responses:
        "200":
          description: Query completed (returns 200 whether or not the user was found)
          content:
            application/json:
              schema:
                type: object
                required: [ok, data]
                properties:
                  ok:
                    type: boolean
                    enum: [true]
                  data:
                    type: object
                    required: [found]
                    properties:
                      found:
                        type: boolean
                      user:
                        $ref: "#/components/schemas/UserSummary"
                        description: Present only when found is true
                      query:
                        type: string
                        description: Present only when found is false
                      is_email:
                        type: boolean
                        description: Present only when found is false; indicates whether the query is an email
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ── Library ───────────────────────────────

  /library:
    get:
      operationId: listLibrary
      tags: [Library]
      summary: List files in the Personal Library
      parameters:
        - name: prefix
          in: query
          description: Path prefix filter
          schema:
            type: string
            default: /
        - $ref: "#/components/parameters/LimitParam"
        - $ref: "#/components/parameters/CursorParam"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                required: [ok, data]
                properties:
                  ok:
                    type: boolean
                    enum: [true]
                  data:
                    type: object
                    required: [paths]
                    properties:
                      paths:
                        type: array
                        items:
                          $ref: "#/components/schemas/PathEntry"
                      next_cursor:
                        type: string
                        nullable: true
        "401":
          $ref: "#/components/responses/Unauthorized"

  /library/path:
    get:
      operationId: getPath
      tags: [Library]
      summary: Get details for a single path
      parameters:
        - $ref: "#/components/parameters/PathQueryParam"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                required: [ok, data]
                properties:
                  ok:
                    type: boolean
                    enum: [true]
                  data:
                    $ref: "#/components/schemas/PathDetail"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  # ── Blobs ─────────────────────────────────

  /blobs/check:
    post:
      operationId: checkBlobs
      tags: [Blobs]
      summary: Check which blobs already exist on the server
      description: |
        Client sends a list of SHA-256 hashes. Server returns only the missing ones.
        Only missing blobs need to be uploaded.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [hashes]
              properties:
                hashes:
                  type: array
                  items:
                    type: string
                  example:
                    - "sha256:abc123..."
                    - "sha256:def456..."
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                required: [ok, data]
                properties:
                  ok:
                    type: boolean
                    enum: [true]
                  data:
                    type: object
                    required: [missing]
                    properties:
                      missing:
                        type: array
                        items:
                          type: string
                        example:
                          - "sha256:def456..."
        "401":
          $ref: "#/components/responses/Unauthorized"

  /blobs/upload:
    post:
      operationId: uploadBlob
      tags: [Blobs]
      summary: Upload a single blob
      description: |
        Uploads raw file content as `application/octet-stream`.
        The server re-computes the hash after receiving the blob and returns 400 if it
        does not match the `X-Blob-Hash` header.
      parameters:
        - name: X-Blob-Hash
          in: header
          required: true
          description: Client-computed SHA-256 hash of the blob
          schema:
            type: string
            example: "sha256:def456..."
        - name: X-Content-Type
          in: header
          required: true
          description: MIME type of the file
          schema:
            type: string
            example: text/markdown
      requestBody:
        required: true
        content:
          application/octet-stream:
            schema:
              type: string
              format: binary
      responses:
        "200":
          description: Upload successful
          content:
            application/json:
              schema:
                type: object
                required: [ok, data]
                properties:
                  ok:
                    type: boolean
                    enum: [true]
                  data:
                    type: object
                    required: [blob_hash, size_bytes]
                    properties:
                      blob_hash:
                        type: string
                        example: "sha256:def456..."
                      size_bytes:
                        type: integer
                        example: 1024
        "400":
          description: Hash mismatch between header and actual content
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "413":
          description: File exceeds size limit
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "429":
          $ref: "#/components/responses/RateLimited"

  # ── Snapshots ─────────────────────────────

  /snapshots:
    post:
      operationId: createSnapshot
      tags: [Snapshots]
      summary: Commit a new snapshot
      description: Creates an immutable version record for a path.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [path, blob_hash, content_type]
              properties:
                path:
                  type: string
                  example: /notes.md
                blob_hash:
                  type: string
                  example: "sha256:abc123..."
                content_type:
                  type: string
                  example: text/markdown
                dependencies:
                  type: array
                  items:
                    $ref: "#/components/schemas/Dependency"
                warnings:
                  type: array
                  items:
                    $ref: "#/components/schemas/SnapshotWarning"
      responses:
        "201":
          description: Snapshot created
          content:
            application/json:
              schema:
                type: object
                required: [ok, data]
                properties:
                  ok:
                    type: boolean
                    enum: [true]
                  data:
                    type: object
                    required: [snapshot_id, path, version_number, blob_hash, created_at]
                    properties:
                      snapshot_id:
                        type: string
                        example: snap_abc123
                      path:
                        type: string
                        example: /notes.md
                      version_number:
                        type: integer
                        example: 3
                      blob_hash:
                        type: string
                      created_at:
                        type: string
                        format: date-time
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

    get:
      operationId: listSnapshots
      tags: [Snapshots]
      summary: List version history for a path
      parameters:
        - $ref: "#/components/parameters/PathQueryParam"
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
            minimum: 1
            maximum: 200
        - $ref: "#/components/parameters/CursorParam"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                required: [ok, data]
                properties:
                  ok:
                    type: boolean
                    enum: [true]
                  data:
                    type: object
                    required: [path, snapshots]
                    properties:
                      path:
                        type: string
                      snapshots:
                        type: array
                        items:
                          $ref: "#/components/schemas/SnapshotEntry"
                      next_cursor:
                        type: string
                        nullable: true
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /snapshots/restore:
    post:
      operationId: restoreSnapshot
      tags: [Snapshots]
      summary: Restore a path to a previous snapshot
      description: |
        Restore never mutates history. It creates a new snapshot whose content matches
        the target version. Because shares point to a live path, recipients see the
        restored state immediately after restore.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [path, target_snapshot_id]
              properties:
                path:
                  type: string
                  example: /notes.md
                target_snapshot_id:
                  type: string
                  example: snap_def456
      responses:
        "201":
          description: Restore successful; new snapshot created
          content:
            application/json:
              schema:
                type: object
                required: [ok, data]
                properties:
                  ok:
                    type: boolean
                    enum: [true]
                  data:
                    type: object
                    required: [new_snapshot_id, version_number, restored_from, created_at]
                    properties:
                      new_snapshot_id:
                        type: string
                        example: snap_ghi789
                      version_number:
                        type: integer
                        example: 4
                      restored_from:
                        type: string
                        example: snap_def456
                      created_at:
                        type: string
                        format: date-time
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  # ── Shares ────────────────────────────────

  /shares:
    post:
      operationId: createShare
      tags: [Shares]
      summary: Create a share
      description: Creates a viewer-only share for an uploaded file.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [path, recipient_user_id]
              properties:
                path:
                  type: string
                  example: /notes.md
                recipient_user_id:
                  type: string
                  example: usr_002
                password:
                  type: string
                  nullable: true
                  description: Optional share password. Omit or set to null for no password.
      responses:
        "201":
          description: Share created
          content:
            application/json:
              schema:
                type: object
                required: [ok, data]
                properties:
                  ok:
                    type: boolean
                    enum: [true]
                  data:
                    type: object
                    required: [share_id, share_token, share_link, path, recipient, has_password, created_at]
                    properties:
                      share_id:
                        type: string
                        example: shr_001
                      share_token:
                        type: string
                        example: xK9mP2qR
                      share_link:
                        type: string
                        format: uri
                        example: https://app.bluedox.io/s/xK9mP2qR
                      path:
                        type: string
                      recipient:
                        $ref: "#/components/schemas/ShareRecipientUser"
                      has_password:
                        type: boolean
                      created_at:
                        type: string
                        format: date-time
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

    get:
      operationId: listShares
      tags: [Shares]
      summary: List all active shares on a path
      description: Owner only. Returns a unified list of shares and invites.
      parameters:
        - $ref: "#/components/parameters/PathQueryParam"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                required: [ok, data]
                properties:
                  ok:
                    type: boolean
                    enum: [true]
                  data:
                    type: object
                    required: [path, shares]
                    properties:
                      path:
                        type: string
                      shares:
                        type: array
                        items:
                          $ref: "#/components/schemas/ShareEntry"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /shares/{share_id}:
    parameters:
      - $ref: "#/components/parameters/ShareIdParam"

    get:
      operationId: getShare
      tags: [Shares]
      summary: Get share details including password (owner only)
      description: |
        Returns the share password in plaintext (stored encrypted at rest on the server).
        This operation produces a `share.password_view` audit event.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                required: [ok, data]
                properties:
                  ok:
                    type: boolean
                    enum: [true]
                  data:
                    $ref: "#/components/schemas/ShareEntry"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

    patch:
      operationId: updateShare
      tags: [Shares]
      summary: Update share settings (password change)
      description: |
        Owner only. Send `password: "new-value"` to set a new password,
        or `password: null` to remove the password.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                password:
                  type: string
                  nullable: true
                  description: New password, or null to remove the password.
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                type: object
                required: [ok, data]
                properties:
                  ok:
                    type: boolean
                    enum: [true]
                  data:
                    type: object
                    required: [share_id, has_password, updated_at]
                    properties:
                      share_id:
                        type: string
                      has_password:
                        type: boolean
                      updated_at:
                        type: string
                        format: date-time
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

    delete:
      operationId: revokeShare
      tags: [Shares]
      summary: Revoke a share
      description: The share link is invalidated immediately.
      responses:
        "200":
          description: Revoked
          content:
            application/json:
              schema:
                type: object
                required: [ok, data]
                properties:
                  ok:
                    type: boolean
                    enum: [true]
                  data:
                    type: object
                    required: [share_id, revoked_at]
                    properties:
                      share_id:
                        type: string
                      revoked_at:
                        type: string
                        format: date-time
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  # ── Invites ───────────────────────────────

  /invites:
    post:
      operationId: createInvite
      tags: [Invites]
      summary: Create an invite for an unregistered user
      description: |
        When the recipient email does not match an existing account, create an Invite
        instead of a Share. The invite auto-converts to a Share when the recipient signs up.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [path, email]
              properties:
                path:
                  type: string
                  example: /notes.md
                email:
                  type: string
                  format: email
                  example: bob@example.com
                password:
                  type: string
                  nullable: true
                  description: Optional share password
      responses:
        "201":
          description: Invite created
          content:
            application/json:
              schema:
                type: object
                required: [ok, data]
                properties:
                  ok:
                    type: boolean
                    enum: [true]
                  data:
                    type: object
                    required: [invite_id, share_token, share_link, path, email, has_password, created_at]
                    properties:
                      invite_id:
                        type: string
                        example: inv_001
                      share_token:
                        type: string
                        example: yL3nQ7wT
                      share_link:
                        type: string
                        format: uri
                      path:
                        type: string
                      email:
                        type: string
                        format: email
                      has_password:
                        type: boolean
                      created_at:
                        type: string
                        format: date-time
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          $ref: "#/components/responses/Conflict"

  # ── Share Access (Public) ─────────────────

  /share-access/{share_token}:
    parameters:
      - $ref: "#/components/parameters/ShareTokenParam"

    get:
      operationId: getShareAccess
      tags: [Share Access]
      summary: Access a shared file via share token
      description: |
        Public endpoint. If the share is password-protected, returns
        `requires_password: true` and the client must call the verify endpoint first.
      security: []
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                required: [ok, data]
                properties:
                  ok:
                    type: boolean
                    enum: [true]
                  data:
                    type: object
                    required: [requires_password, path_name]
                    properties:
                      requires_password:
                        type: boolean
                      path_name:
                        type: string
                        example: notes.md
                      owner:
                        type: object
                        properties:
                          username:
                            type: string
                      content_type:
                        type: string
                        description: Only returned when no password is required
                      content_url:
                        type: string
                        description: Only returned when no password is required
        "404":
          description: Invalid or revoked share token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /share-access/{share_token}/verify:
    parameters:
      - $ref: "#/components/parameters/ShareTokenParam"

    post:
      operationId: verifySharePassword
      tags: [Share Access]
      summary: Verify a share password
      description: |
        On success, returns a temporary access token (prefixed `sat_temp_`, TTL 1 hour)
        that grants access to the shared content.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [password]
              properties:
                password:
                  type: string
      responses:
        "200":
          description: Password verified
          content:
            application/json:
              schema:
                type: object
                required: [ok, data]
                properties:
                  ok:
                    type: boolean
                    enum: [true]
                  data:
                    type: object
                    required: [verified, access_token, expires_in, content_url]
                    properties:
                      verified:
                        type: boolean
                        enum: [true]
                      access_token:
                        type: string
                        description: Temporary share access token
                        example: sat_temp_abc123
                      expires_in:
                        type: integer
                        description: Token TTL in seconds
                        example: 3600
                      content_url:
                        type: string
        "401":
          description: Incorrect password
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
              example:
                ok: false
                error:
                  code: INVALID_PASSWORD
                  message: Incorrect password
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/RateLimited"

  /share-access/{share_token}/content:
    parameters:
      - $ref: "#/components/parameters/ShareTokenParam"

    get:
      operationId: getSharedContent
      tags: [Share Access]
      summary: Download shared file content
      description: |
        No auth required for shares without a password. For password-protected shares,
        provide the temporary token from the verify endpoint. Returns raw file content
        with the appropriate Content-Type header.
      security:
        - {}
        - ShareAccessToken: []
      responses:
        "200":
          description: File content
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
            text/markdown:
              schema:
                type: string
            image/*:
              schema:
                type: string
                format: binary
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  # ── Shared With Me ────────────────────────

  /shared-with-me:
    get:
      operationId: listSharedWithMe
      tags: [Shared With Me]
      summary: List content shared with the current user
      parameters:
        - $ref: "#/components/parameters/LimitParam"
        - $ref: "#/components/parameters/CursorParam"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                required: [ok, data]
                properties:
                  ok:
                    type: boolean
                    enum: [true]
                  data:
                    type: object
                    required: [items]
                    properties:
                      items:
                        type: array
                        items:
                          $ref: "#/components/schemas/SharedWithMeItem"
                      next_cursor:
                        type: string
                        nullable: true
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ── Audit Log ─────────────────────────────

  /audit-log:
    get:
      operationId: listAuditLog
      tags: [Audit Log]
      summary: Query the audit log
      description: Returns security-relevant events for the authenticated account.
      parameters:
        - name: action
          in: query
          description: Filter by action type
          schema:
            type: string
            enum:
              - auth.login
              - library.upload
              - share.create
              - invite.create
              - share.password_view
              - share.password_change
              - share.revoke
              - snapshot.restore
        - name: path
          in: query
          description: Filter by file path
          schema:
            type: string
        - name: since
          in: query
          description: ISO 8601 start time
          schema:
            type: string
            format: date-time
        - name: limit
          in: query
          schema:
            type: integer
            default: 100
            minimum: 1
            maximum: 1000
        - $ref: "#/components/parameters/CursorParam"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                required: [ok, data]
                properties:
                  ok:
                    type: boolean
                    enum: [true]
                  data:
                    type: object
                    required: [events]
                    properties:
                      events:
                        type: array
                        items:
                          $ref: "#/components/schemas/AuditEvent"
                      next_cursor:
                        type: string
                        nullable: true
        "401":
          $ref: "#/components/responses/Unauthorized"

# ═════════════════════════════════════════════
# Tags
# ═════════════════════════════════════════════
tags:
  - name: Auth
    description: Authentication endpoints
  - name: Users
    description: User resolution
  - name: Library
    description: Personal Library file management
  - name: Blobs
    description: Content-addressed blob storage (deduplicated uploads)
  - name: Snapshots
    description: Immutable version history
  - name: Shares
    description: Share management (owner operations)
  - name: Invites
    description: Invite unregistered users by email
  - name: Share Access
    description: Public share access endpoints
  - name: Shared With Me
    description: Content shared by other users
  - name: Audit Log
    description: Security audit trail
